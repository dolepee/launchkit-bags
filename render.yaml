services:
  - type: web
    name: launchkit-bags
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: NEXT_BASE_PATH
        value: ""
